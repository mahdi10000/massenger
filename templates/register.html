<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام - AlphaMessenger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            width: 360px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .logo { text-align: center; font-size: 48px; margin-bottom: 10px; }
        h2 { text-align: center; color: #e0e0e0; margin-bottom: 30px; font-size: 20px; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #0f3460;
            color: #fff;
            font-size: 15px;
            font-family: Tahoma;
        }
        input:focus { outline: none; border-color: #e94560; }
        button {
            width: 100%;
            padding: 13px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-family: Tahoma;
        }
        button:hover { background: #c73652; }
        .link { text-align: center; margin-top: 20px; color: #888; font-size: 14px; }
        .link a { color: #e94560; text-decoration: none; }
        .error {
            background: #c0392b;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">💬</div>
    <h2>ثبت‌نام</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <input type="text" name="username" placeholder="نام کاربری" required autofocus>
        <input type="password" name="password" placeholder="رمز عبور" required>
        <input type="password" name="password2" placeholder="تکرار رمز عبور" required>
        <button type="submit">ثبت‌نام</button>
    </form>
    <div class="link">
        حساب داری؟ <a href="/login">وارد شو</a>
    </div>
</div>
</body>
</html>
